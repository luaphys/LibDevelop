name: Build Bones Engine

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ide:
    name: Build Bones Engine IDE
    runs-on: ubuntu-latest

    # ✅ GLOBAL ENV (correct way)
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      GENERATE_SOURCEMAP: false
      CI: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: newIDE/app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install setuptools

      # ✅ FIXED EMSDK (persists across steps)
      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install 3.1.21
          ./emsdk activate 3.1.21
          echo "$(pwd)" >> $GITHUB_PATH
          echo "EMSDK=$(pwd)" >> $GITHUB_ENV
          echo "PATH=$(pwd):$(pwd)/upstream/emscripten:$PATH" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: newIDE/app
        run: npm install

      - name: Rename to Bones Engine
        working-directory: newIDE/app
        run: |
          sed -i 's/GDevelop/Bones Engine/g' package.json
          sed -i 's/gdevelop/bones-engine/g' package.json

      - name: Build IDE
        working-directory: newIDE/app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bones-engine-build
          path: newIDE/app/build/
          retention-days: 7

  build-desktop:
    name: Build Bones Engine Desktop App
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    # ✅ GLOBAL ENV AGAIN
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      GENERATE_SOURCEMAP: false
      CI: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install setuptools

      # ✅ FIXED EMSDK
      - name: Setup Emscripten
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install 3.1.21
          ./emsdk activate 3.1.21
          echo "$(pwd)" >> $GITHUB_PATH
          echo "EMSDK=$(pwd)" >> $GITHUB_ENV
          echo "PATH=$(pwd):$(pwd)/upstream/emscripten:$PATH" >> $GITHUB_ENV

      - name: Install dependencies
        working-directory: newIDE/electron-app
        run: npm install

      - name: Install IDE dependencies
        working-directory: newIDE/app
        run: npm install

      - name: Build IDE first
        working-directory: newIDE/app
        run: npm run build

      - name: Build Desktop App
        working-directory: newIDE/electron-app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows build
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bones-engine-windows
          path: newIDE/electron-app/dist/*.exe
          retention-days: 7

      - name: Upload Linux build
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bones-engine-linux
          path: newIDE/electron-app/dist/*.AppImage
          retention-days: 7

      - name: Upload macOS build
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: bones-engine-macos
          path: newIDE/electron-app/dist/*.dmg
          retention-days: 7
